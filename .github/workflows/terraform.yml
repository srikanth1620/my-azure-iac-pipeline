name: Terraform Deploy to Azure

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  security-events: write     # Required for uploading results to GitHub Security tab

jobs:
  terraform:
    name: Terraform Apply
    runs-on: ubuntu-latest

    # This ensures all 'run:' steps execute in the root directory
    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.x"

      # Set Azure credentials
      - name: Configure Azure Credentials
        run: |
          echo "ARM_CLIENT_ID=${{ secrets.AZURE_CLIENT_ID }}" >> $GITHUB_ENV
          echo "ARM_CLIENT_SECRET=${{ secrets.AZURE_CLIENT_SECRET }}" >> $GITHUB_ENV
          echo "ARM_TENANT_ID=${{ secrets.AZURE_TENANT_ID }}" >> $GITHUB_ENV
          echo "ARM_SUBSCRIPTION_ID=${{ secrets.AZURE_SUBSCRIPTION_ID }}" >> $GITHUB_ENV

      - name: Login to Azure using Service Principal
        run: |
          az login --service-principal \
            -u ${{ secrets.AZURE_CLIENT_ID }} \
            -p ${{ secrets.AZURE_CLIENT_SECRET }} \
            --tenant ${{ secrets.AZURE_TENANT_ID }}

      - name: Terraform Init
        run: terraform init

      # ==================== TRIVY SECURITY SCANS ====================

      - name: Run Trivy IaC Scan (Terraform Config)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: 'config'
          scan-ref: '.'
          severity: 'HIGH,CRITICAL'
          format: 'sarif'
          output: 'trivy-config-results.sarif'
          exit-code: '1'

      - name: Terraform Plan
        run: terraform plan -out=plan.tfplan

      - name: Convert Terraform Plan to JSON
        run: terraform show -json plan.tfplan > plan.json

      - name: Run Trivy on Terraform Plan (Most Accurate Scan)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: 'config'
          scan-ref: 'plan.json'
          severity: 'HIGH,CRITICAL'
          format: 'sarif'
          output: 'trivy-plan-results.sarif'
          exit-code: '1'

      # Upload results to GitHub Security tab
      - name: Upload Trivy Config Results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-config-results.sarif'

      - name: Upload Trivy Plan Results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-plan-results.sarif'

      # ==================== APPLY ====================
      - name: Terraform Apply
        run: terraform apply -auto-approve plan.tfplan