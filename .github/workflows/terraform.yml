name: Terraform Deploy with Security Scan

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  security-events: write   # Required to upload to Security tab

jobs:
  trivy-scan:
    name: Trivy Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy IaC Scan (Config)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: 'config'
          scan-ref: '.'
          severity: 'LOW,MEDIUM,HIGH,CRITICAL'     # Show all severities
          format: 'sarif'
          output: 'trivy-config-results.sarif'     # Consistent filename
          exit-code: '0'
        continue-on-error: true

      - name: Debug - Trivy Results Summary
        run: |
          echo "=== Trivy Scan Summary ==="
          if [ -f trivy-config-results.sarif ]; then
            echo "SARIF file created successfully"
            grep -o '"severity":"[^"]*"' trivy-config-results.sarif | sort | uniq -c || echo "No severity data found"
            echo "Total lines in SARIF: $(wc -l < trivy-config-results.sarif)"
          else
            echo "SARIF file NOT found!"
          fi

      - name: Upload Trivy Results
        if: always() && hashFiles('trivy-config-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-config-results.sarif'

  terraform-deploy:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: trivy-scan

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.x"

      - name: Configure Azure Credentials
        run: |
          echo "ARM_CLIENT_ID=${{ secrets.AZURE_CLIENT_ID }}" >> $GITHUB_ENV
          echo "ARM_CLIENT_SECRET=${{ secrets.AZURE_CLIENT_SECRET }}" >> $GITHUB_ENV
          echo "ARM_TENANT_ID=${{ secrets.AZURE_TENANT_ID }}" >> $GITHUB_ENV
          echo "ARM_SUBSCRIPTION_ID=${{ secrets.AZURE_SUBSCRIPTION_ID }}" >> $GITHUB_ENV

      - name: Login to Azure
        run: |
          az login --service-principal \
            -u ${{ secrets.AZURE_CLIENT_ID }} \
            -p ${{ secrets.AZURE_CLIENT_SECRET }} \
            --tenant ${{ secrets.AZURE_TENANT_ID }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan -out=plan.tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve plan.tfplan