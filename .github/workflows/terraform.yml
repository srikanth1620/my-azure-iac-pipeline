name: Terraform Deploy to Azure

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  terraform:
    name: Terraform Apply
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.x"

      - name: Configure Azure Credentials
        run: |
          echo "ARM_CLIENT_ID=${{ secrets.AZURE_CLIENT_ID }}" >> $GITHUB_ENV
          echo "ARM_CLIENT_SECRET=${{ secrets.AZURE_CLIENT_SECRET }}" >> $GITHUB_ENV
          echo "ARM_TENANT_ID=${{ secrets.AZURE_TENANT_ID }}" >> $GITHUB_ENV
          echo "ARM_SUBSCRIPTION_ID=${{ secrets.AZURE_SUBSCRIPTION_ID }}" >> $GITHUB_ENV

      - name: Login to Azure
        run: |
          az login --service-principal \
            -u ${{ secrets.AZURE_CLIENT_ID }} \
            -p ${{ secrets.AZURE_CLIENT_SECRET }} \
            --tenant ${{ secrets.AZURE_TENANT_ID }}

      - name: Terraform Init
        run: terraform init

      - name: Debug - List Terraform files
        run: ls -la *.tf || echo "No .tf files found in root!"

      # ==================== TRIVY SCANS ====================

      - name: Run Trivy IaC Scan (Config)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: 'config'
          scan-ref: '.'
          severity: 'HIGH,CRITICAL'
          format: 'sarif'
          output: 'trivy-config-results.sarif'
          exit-code: '0'
        continue-on-error: true

      - name: Terraform Plan
        run: terraform plan -out=plan.tfplan

      - name: Convert Plan to JSON
        run: terraform show -json plan.tfplan > plan.json

      - name: Run Trivy on Terraform Plan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: 'config'
          scan-ref: 'plan.json'
          severity: 'HIGH,CRITICAL'
          format: 'sarif'
          output: 'trivy-plan-results.sarif'
          exit-code: '0'
        continue-on-error: true

      # ==================== UPLOAD RESULTS ====================

      - name: Upload Trivy Config Results
        if: always() && hashFiles('trivy-config-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-config-results.sarif'

      - name: Upload Trivy Plan Results
        if: always() && hashFiles('trivy-plan-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-plan-results.sarif'

      # ==================== APPLY ====================
      - name: Terraform Apply
        run: terraform apply -auto-approve plan.tfplan